<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-FOR-RENT - Payment Receipt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .receipt-card { box-shadow: none !important; border: 1px solid #ddd !important; }
    }
    .receipt-line { background: repeating-linear-gradient(90deg, #e5e7eb 0, #e5e7eb 6px, transparent 0, transparent 14px); height: 2px; }
    .checkmark-circle { animation: pop 0.4s ease-out; }
    @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-green-50 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="bg-white shadow-sm no-print">
    <div class="max-w-7xl mx-auto px-4 h-14 flex justify-between items-center">
      <a href="index.html" class="text-xl font-extrabold text-blue-600">E-FOR-RENT</a>
      <a href="index.html" class="text-sm text-gray-500 hover:text-blue-600 font-medium">← হোমে ফিরুন</a>
    </div>
  </nav>

  <!-- Receipt Container -->
  <main class="flex-1 flex items-center justify-center p-4 py-10">
    <div class="w-full max-w-md" id="receipt-container">
      <!-- Skeleton -->
      <div class="animate-pulse bg-white rounded-3xl shadow-xl p-8 space-y-4">
        <div class="h-20 w-20 bg-gray-200 rounded-full mx-auto"></div>
        <div class="h-6 bg-gray-200 rounded w-2/3 mx-auto"></div>
        <div class="h-4 bg-gray-200 rounded w-1/2 mx-auto"></div>
        <div class="h-40 bg-gray-200 rounded-xl mt-4"></div>
        <div class="h-10 bg-gray-200 rounded-xl"></div>
      </div>
    </div>
  </main>

  <div id="toast" class="hidden fixed bottom-6 right-6 z-[100] px-5 py-3 rounded-xl text-white font-semibold shadow-lg"></div>

  <script src="app.js"></script>
  <script>
    async function loadReceipt() {
      const receiptId  = new URLSearchParams(window.location.search).get('id');
      const container  = document.getElementById('receipt-container');
      if (!receiptId) {
        container.innerHTML = errorCard('রিসিপ্ট আইডি পাওয়া যায়নি।');
        return;
      }
      try {
        const { payment: p } = await apiFetch(`/api/payments/receipt/${receiptId}`);
        renderReceipt(p, container);
      } catch (err) {
        container.innerHTML = errorCard(err.message);
      }
    }

    function renderReceipt(p, container) {
      document.title = `Receipt — ${p.transactionId}`;
      const isBkash   = p.provider === 'bkash';
      const color     = isBkash ? { bg: 'bg-pink-600',   grad: 'from-pink-500 to-pink-700',   ring: 'ring-pink-300',   btn: 'bg-pink-600 hover:bg-pink-700'   }
                                : { bg: 'bg-orange-500', grad: 'from-orange-400 to-orange-600', ring: 'ring-orange-300', btn: 'bg-orange-500 hover:bg-orange-600' };
      const name      = isBkash ? 'bKash' : 'Nagad';
      const paidAt    = new Date(p.paidAt);
      const dateStr   = paidAt.toLocaleDateString('bn-BD', { year:'numeric', month:'long', day:'numeric' });
      const timeStr   = paidAt.toLocaleTimeString('bn-BD', { hour:'2-digit', minute:'2-digit' });

      container.innerHTML = `
        <div class="receipt-card bg-white rounded-3xl shadow-2xl overflow-hidden print:shadow-none">

          <!-- ── Header ── -->
          <div class="bg-gradient-to-br ${color.grad} text-white p-7 text-center relative">
            <div class="checkmark-circle w-20 h-20 bg-white bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-3 ring-4 ${color.ring}">
              <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight">পেমেন্ট সফল!</h1>
            <p class="text-white text-opacity-80 text-sm mt-1">${name} এর মাধ্যমে পরিশোধিত</p>
            <div class="mt-4 bg-white bg-opacity-20 rounded-2xl px-6 py-3 inline-block">
              <p class="text-3xl font-black">${Number(p.amount).toLocaleString('bn-BD')} ৳</p>
            </div>
          </div>

          <!-- ── Receipt Body ── -->
          <div class="p-6">

            <!-- Transaction Badge -->
            <div class="text-center mb-5">
              <span class="bg-gray-100 text-gray-500 text-xs font-mono px-4 py-2 rounded-full border">
                TXN: ${p.transactionId}
              </span>
            </div>

            <!-- Dashed separator -->
            <div class="receipt-line mb-5"></div>

            <!-- Details Table -->
            <div class="space-y-3 text-sm">
              ${row('📋 রিসিপ্ট নং',    `<span class="font-mono text-xs text-blue-600">${p.receiptId.slice(0,20)}…</span>`)}
              ${row('💡 বিলের ধরন',     `<span class="font-semibold">${p.billName}</span>`)}
              ${row('💰 পরিমাণ',         `<span class="font-bold text-green-600 text-base">${Number(p.amount).toLocaleString('bn-BD')} ৳</span>`)}
              ${row('📱 মোবাইল নম্বর', `<span class="font-semibold">${p.payerPhone}</span>`)}
              ${row('🏦 পেমেন্ট মাধ্যম', `<span class="font-bold ${isBkash ? 'text-pink-600' : 'text-orange-500'}">${name}</span>`)}
              ${row('🏠 সম্পত্তি',       `<span class="text-right leading-tight">${p.property?.title || 'N/A'}</span>`)}
              ${row('📍 ঠিকানা',         `<span class="text-gray-500 text-right leading-tight">${p.property?.address || ''}</span>`)}
              ${row('📅 তারিখ',          `<span class="font-medium">${dateStr}</span>`)}
              ${row('⏰ সময়',            `<span class="font-medium">${timeStr}</span>`)}
            </div>

            <!-- Dashed separator -->
            <div class="receipt-line my-5"></div>

            <!-- Status Badge -->
            <div class="flex justify-center mb-5">
              <span class="bg-green-50 border border-green-200 text-green-700 text-sm font-bold px-5 py-2 rounded-full flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                পেমেন্ট সম্পন্ন হয়েছে
              </span>
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-3 no-print">
              <button onclick="window.print()"
                      class="flex-1 flex items-center justify-center gap-2 bg-gray-800 text-white py-3 rounded-2xl font-bold hover:bg-gray-700 transition text-sm">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                প্রিন্ট করুন
              </button>
              <a href="index.html"
                 class="flex-1 flex items-center justify-center gap-2 ${color.btn} text-white py-3 rounded-2xl font-bold transition text-sm">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                হোমে যান
              </a>
            </div>

            <!-- Footer note -->
            <p class="text-center text-xs text-gray-400 mt-4 no-print">🔒 এই রিসিপ্টটি সংরক্ষণ করুন</p>
          </div>
        </div>`;
    }

    function row(label, value) {
      return `<div class="flex justify-between items-start gap-3 py-2 border-b border-gray-50">
        <span class="text-gray-500 whitespace-nowrap">${label}</span>
        <span class="text-right">${value}</span>
      </div>`;
    }

    function errorCard(msg) {
      return `<div class="bg-white rounded-3xl shadow-xl p-10 text-center">
        <p class="text-5xl mb-4">😕</p>
        <p class="text-lg font-bold text-gray-700 mb-2">রিসিপ্ট পাওয়া যায়নি</p>
        <p class="text-sm text-red-500 mb-6">${msg}</p>
        <a href="index.html" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-blue-700 transition inline-block">হোমে যান</a>
      </div>`;
    }

    document.addEventListener('DOMContentLoaded', loadReceipt);
  </script>
</body>
</html>
