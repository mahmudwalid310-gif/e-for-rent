<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-FOR-RENT — বাসার বিস্তারিত তথ্য, বিল পেমেন্ট এবং মালিকের সাথে যোগাযোগ করুন।">
    <title>E-FOR-RENT - Property Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="text-2xl font-bold text-blue-600 brand-logo">E-FOR-RENT</a>
                <div class="flex items-center space-x-4">
                    <button onclick="switchLanguage()" id="lang-btn"
                            class="bg-gray-200 text-gray-800 px-3 py-1 rounded-md text-sm font-bold hover:bg-gray-300">
                        EN
                    </button>
                    <a href="index.html" id="back-link"
                       class="text-gray-700 hover:text-blue-600 font-medium text-sm lang"
                       data-en="Back to Home" data-bn="হোমে ফিরুন">হোমে ফিরুন</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content: populated by app.js loadPropertyDetails() -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="details-container">
            <!-- Skeleton loader while JS loads -->
            <div class="animate-pulse space-y-4">
                <div class="h-8 bg-gray-200 rounded w-2/3"></div>
                <div class="h-4 bg-gray-200 rounded w-1/3"></div>
                <div class="h-64 bg-gray-200 rounded-xl"></div>
                <div class="h-4 bg-gray-200 rounded w-full"></div>
                <div class="h-4 bg-gray-200 rounded w-5/6"></div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-500 text-center py-4 mt-16 text-sm">
        <p>&copy; 2026 E-FOR-RENT. All rights reserved.</p>
    </footer>

    <!-- Payment Modal -->
    <div id="payment-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-2xl max-w-sm w-full overflow-hidden shadow-2xl">
            <div id="modal-header" class="bg-pink-600 text-white p-4 text-center font-bold text-lg relative">
                <span id="provider-name">bKash</span> Payment
                <button onclick="closePaymentModal()" class="absolute right-4 top-4 text-white font-bold text-xl">✕</button>
            </div>
            <div class="p-5">
                <!-- Provider Selector -->
                <div class="flex gap-2 mb-4">
                    <button id="btn-bkash" onclick="selectProvider('bkash')" class="flex-1 py-2 rounded-lg font-bold text-sm bg-pink-600 text-white">bKash</button>
                    <button id="btn-nagad" onclick="selectProvider('nagad')" class="flex-1 py-2 rounded-lg font-bold text-sm bg-gray-100 text-gray-700">Nagad</button>
                </div>
                <!-- Bill Info -->
                <div class="text-center bg-gray-50 p-3 rounded-xl border mb-4">
                    <p class="text-gray-500 text-xs uppercase font-bold" id="modal-bill-title">বিলের নাম</p>
                    <p class="text-2xl font-black text-gray-800" id="modal-bill-amount">0 ৳</p>
                </div>
                <!-- Payment Form -->
                <form id="payment-form" onsubmit="processPayment(event)" class="space-y-3">
                    <input type="hidden" id="pay-bill-type">
                    <input type="hidden" id="pay-bill-amount">
                    <input id="payer-phone" type="tel" required placeholder="মোবাইল নাম্বার (01XXXXXXXXX)"
                           class="w-full border rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400">
                    <input type="password" required placeholder="পিন নাম্বার (৪ ডিজিট)" maxlength="4"
                           class="w-full border rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400">
                    <button type="submit" id="modal-pay-btn"
                            class="w-full bg-pink-600 text-white py-3.5 rounded-xl font-bold hover:bg-pink-700 shadow-md">
                        কনফার্ম পেমেন্ট
                    </button>
                </form>
                <p class="text-xs text-gray-400 text-center mt-3">🔒 নিরাপদ পেমেন্ট গেটওয়ে</p>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-6 right-6 z-[100] px-5 py-3 rounded-xl text-white font-semibold shadow-lg transition-all"></div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateNavUI();
            loadPropertyDetails();
        });

        // Bilingual switcher
        let currentLang = 'bn';
        function switchLanguage() {
            const elements = document.querySelectorAll('.lang');
            const btn = document.getElementById('lang-btn');
            if (currentLang === 'bn') {
                elements.forEach(el => { el.textContent = el.getAttribute('data-en'); });
                btn.textContent = 'বাং';
                currentLang = 'en';
            } else {
                elements.forEach(el => { el.textContent = el.getAttribute('data-bn'); });
                btn.textContent = 'EN';
                currentLang = 'bn';
            }
        }
    </script>
</body>
</html>
